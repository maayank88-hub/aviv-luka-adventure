<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Aviv & Luka's Adventure</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@700;900&display=swap');
*{margin:0;padding:0;box-sizing:border-box}
body{background:#1a1a2e;display:flex;justify-content:center;align-items:center;min-height:100svh;overflow:hidden;touch-action:none}
#wrap{position:relative;width:min(430px,100vw);height:min(932px,100svh);overflow:hidden;border-radius:28px;box-shadow:0 0 80px rgba(0,0,0,0.7)}
canvas{display:block;width:100%;height:100%}
#hud{position:absolute;top:0;left:0;right:0;padding:14px 18px;display:none;justify-content:space-between;align-items:center;z-index:10;pointer-events:none}
#score-box{background:rgba(255,255,255,0.95);border-radius:20px;padding:7px 16px;display:flex;align-items:center;gap:6px;box-shadow:0 4px 14px rgba(0,0,0,0.2)}
#score-box span{font-family:'Nunito',sans-serif;font-weight:900;font-size:20px;color:#1D3557}
#lives{display:flex;gap:4px}
.heart{font-size:20px}
.heart.lost{filter:grayscale(1) opacity(0.35)}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:20}
#splash-screen{background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;}
#gameover-screen{background:linear-gradient(170deg,#ffecd2,#fcb69f);display:none}
#gameover-screen h2{font-family:'Baloo 2',cursive;font-size:44px;font-weight:800;color:#1D3557;margin-bottom:8px}
#final-msg{font-family:'Nunito',sans-serif;font-size:20px;color:#1D3557;margin-bottom:28px;font-weight:700}
.btn{background:#FFD166;color:#1D3557;font-family:'Baloo 2',cursive;font-size:22px;font-weight:800;padding:16px 52px;border:none;border-radius:50px;cursor:pointer;box-shadow:0 6px 0 #c9a030,0 8px 18px rgba(0,0,0,0.3);transition:all 0.1s;touch-action:manipulation;margin-top:20px}
.btn:active{transform:translateY(4px);box-shadow:0 2px 0 #c9a030}
#loading{position:absolute;inset:0;background:#1a1a2e;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:30}
#loading p{font-family:'Baloo 2',cursive;font-size:22px;color:white;margin-top:16px}
.spinner{width:48px;height:48px;border:5px solid rgba(255,255,255,0.2);border-top-color:#FFD166;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.popup{position:absolute;font-size:22px;font-family:'Nunito',sans-serif;font-weight:900;color:#FFD166;text-shadow:0 2px 6px rgba(0,0,0,0.7);pointer-events:none;z-index:15;transform:translateX(-50%);animation:popUp 0.9s ease forwards}
@keyframes popUp{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(1)}100%{opacity:0;transform:translateX(-50%) translateY(-65px) scale(1.3)}}
</style>
</head>
<body>
<div id="wrap">
<canvas id="gc"></canvas>
<div id="hud">
  <div id="score-box">⭐ <span id="sc">0</span></div>
  <div id="lives"><span class="heart" id="h1">❤️</span><span class="heart" id="h2">❤️</span><span class="heart" id="h3">❤️</span></div>
</div>
<div id="loading"><div class="spinner"></div><p>Loading...</p></div>
<div class="screen" id="splash-screen" style="display:none">
  <canvas id="splash-canvas" style="position:absolute;inset:0;width:100%;height:100%"></canvas>
  <button class="btn" id="start-btn" style="position:relative;z-index:2;margin-top:60vh">▶ Play!</button>
</div>
<div class="screen" id="gameover-screen">
  <h2>Game Over! 💫</h2>
  <div id="final-msg">You collected <span id="fsn">0</span> snacks!</div>
  <button class="btn" id="restart-btn">🔄 Try Again</button>
</div>
</div>
<script>
const wrap=document.getElementById('wrap');
const gc=document.getElementById('gc');
const ctx=gc.getContext('2d');
let W,H;
function resize(){W=gc.width=wrap.clientWidth;H=gc.height=wrap.clientHeight;}
resize();

// ── IMAGE LOADER ──────────────────────────────────────────────
const IMG={};
function loadImg(key,src){return new Promise(res=>{const i=new Image();i.onload=()=>{IMG[key]=i;res(true);};i.onerror=()=>{console.warn('Failed:',key);res(false);};i.src=src;});}

// ── CONSTANTS ─────────────────────────────────────────────────
const GRAVITY=0.55;
const JUMP_FORCE=-15;
const GROUND=()=>H-100;
const PLAYER_W=70;
const PLAYER_H=100;
const LUKA_W=102;
const LUKA_H=86;

// ── PLAYER ────────────────────────────────────────────────────
const player={x:120,y:0,vy:0,onGround:false,invincible:0,animFrame:0,animTimer:0};

// ── STATE ─────────────────────────────────────────────────────
let state='loading',score=0,lives=3,frame=0,raf;
let scrollX=0,scrollSpeed=2.2;
let obstacles=[],snacks=[],decor=[],clouds=[];
let bgX=0;

// ── SPLASH SCREEN ─────────────────────────────────────────────
function drawSplash(){
  const sc=document.getElementById('splash-canvas');
  sc.width=W; sc.height=H;
  const sctx=sc.getContext('2d');
  // Background
  if(IMG.splash_bg){
    sctx.drawImage(IMG.splash_bg,0,0,W,H);
  } else {
    const g=sctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,'#1a1a2e');g.addColorStop(1,'#4a1a6e');
    sctx.fillStyle=g;sctx.fillRect(0,0,W,H);
  }
  // Logo centered horizontally and vertically
  if(IMG.logo){
    const lw=Math.min(W*0.82,340);
    const lh=lw*(IMG.logo.height/IMG.logo.width);
    const lx=(W-lw)/2;
    const ly=(H-lh)/2 - 100; // slightly above center to make room for button
    sctx.drawImage(IMG.logo,lx,ly,lw,lh);
  }
}

// ── LEVEL GENERATION ─────────────────────────────────────────
function initLevel(){
  obstacles=[];snacks=[];decor=[];clouds=[];
  scrollX=0;scrollSpeed=2.2;frame=0;
  player.x=120;player.y=GROUND()-PLAYER_H;
  player.vy=0;player.onGround=true;player.invincible=0;player.animFrame=0;

  // Generate obstacles — well spaced, alternating types
  let lastObstacleType='cat';
  for(let i=0;i<25;i++){
    const x=600+i*500+Math.random()*150;
    const type=lastObstacleType==='cat'?'road':'cat';
    lastObstacleType=type;
    obstacles.push({x,type,dead:false,
      vx:0,
      // road collision width narrower than visual (50px instead of 85px)
      w:type==='road'?50:52,
      h:type==='road'?50:60
    });
  }

  // Snacks — 2 heights: ground level and jump level (50/50)
  for(let i=0;i<40;i++){
    const isJump=Math.random()<0.5;
    snacks.push({
      x:350+i*220+Math.random()*80,
      // ground level: just above player head, jump level: high up
      y:isJump ? GROUND()-PLAYER_H-90 : GROUND()-PLAYER_H+10,
      kind:Math.random()<0.5?'bone':'cookie',
      collected:false,
      bob:Math.random()*Math.PI*2,
      rot:0,rotSpeed:(Math.random()-0.5)*0.05
    });
  }

  // Decorations — no two same in a row, smaller sizes
  const decorTypes=['tree','tree2','bush','bench','swing','swing2','slide'];
  const decorH={tree:100,tree2:100,bush:50,bench:45,swing:90,swing2:90,slide:85};
  let lastDecorType='';
  for(let i=0;i<40;i++){
    let type;
    do{type=decorTypes[Math.floor(Math.random()*decorTypes.length)];}
    while(type===lastDecorType);
    lastDecorType=type;
    const img=IMG[type];
    const h=decorH[type]||80;
    const w=img?img.width/img.height*h:60;
    decor.push({x:150+i*320+Math.random()*120,type,h,w});
  }

  // Clouds
  for(let i=0;i<10;i++){
    clouds.push({x:Math.random()*W*4,y:40+Math.random()*H*0.25,speed:0.8+Math.random()*0.5,scale:0.6+Math.random()*0.8});
  }
}

// ── PLAYER ANIMATION ─────────────────────────────────────────
function getPlayerImg(){
  // Switch frame every 15 game frames = ~4 steps per second
  const animStep = Math.floor(frame/15)%3;
  if(animStep===0) return IMG.aviv_standing||IMG.aviv_walk_right;
  if(animStep===1) return IMG.aviv_walk_right;
  return IMG.aviv_walk_left;
}
function getLukaImg(){
  const animStep = Math.floor(frame/15)%3;
  if(animStep===0) return IMG.luka_standing||IMG.luka_walk_right;
  if(animStep===1) return IMG.luka_walk_right||IMG.luka_standing;
  return IMG.luka_walk_left||IMG.luka_standing;
}

// ── DRAWING ───────────────────────────────────────────────────
function drawBg(){
  // Sky gradient
  const g=ctx.createLinearGradient(0,0,0,H*0.75);
  g.addColorStop(0,'#5BC8F5');g.addColorStop(0.6,'#87CEEB');g.addColorStop(1,'#C8E6C9');
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

  // Sun
  ctx.fillStyle='#FFE066';
  ctx.beginPath();ctx.arc(W*0.82,65,38,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,224,102,0.2)';
  ctx.beginPath();ctx.arc(W*0.82,65,55,0,Math.PI*2);ctx.fill();

  // Clouds
  clouds.forEach(c=>{
    c.x-=c.speed;
    if(c.x<-250)c.x=W+250;
    if(IMG.cloud){
      ctx.save();ctx.globalAlpha=0.9;
      const cw=72*c.scale;
      const ch=IMG.cloud.height/IMG.cloud.width*cw;
      ctx.drawImage(IMG.cloud,c.x,c.y,cw,ch);
      ctx.restore();
    } else {
      ctx.fillStyle='rgba(255,255,255,0.88)';
      ctx.save();ctx.translate(c.x,c.y);ctx.scale(c.scale,c.scale);
      ctx.beginPath();ctx.arc(0,0,24,0,Math.PI*2);ctx.arc(32,-8,18,0,Math.PI*2);ctx.arc(58,0,22,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  });
}

function drawGround(){
  // Grass
  ctx.fillStyle='#5DB85A';
  ctx.fillRect(0,GROUND(),W,18);
  // Grass texture
  ctx.fillStyle='#4da84a';
  for(let i=0;i<W;i+=16){ctx.fillRect(i,GROUND(),8,10);}
  // Dirt
  ctx.fillStyle='#8B6347';
  ctx.fillRect(0,GROUND()+18,W,H);
  // Dirt texture
  ctx.fillStyle='#7a5535';
  for(let i=0;i<W;i+=30){for(let j=0;j<4;j++){ctx.fillRect(i+Math.sin(i+j)*10,GROUND()+22+j*18,12,8);}}
}

function drawDecor(){
  decor.forEach(d=>{
    const dx=d.x-scrollX;
    if(dx<-200||dx>W+200)return;
    const img=IMG[d.type];
    if(img){ctx.drawImage(img,dx,GROUND()-d.h,d.w,d.h);}
    else{ctx.fillStyle='#4CAF50';ctx.fillRect(dx,GROUND()-d.h,d.w,d.h);}
  });
}

function drawRoadObstacles(){
  obstacles.forEach(o=>{
    if(o.dead||o.type!=='road')return;
    const ox=o.x-scrollX;
    if(ox<-100||ox>W+100)return;
    const rw=80,rh=100;
    if(IMG.road){ctx.drawImage(IMG.road,ox,GROUND()+8,rw,rh);}
    else{ctx.fillStyle='#555';ctx.fillRect(ox,GROUND()+8,rw,rh);}
  });
}

function drawCatObstacles(){
  obstacles.forEach(o=>{
    if(o.dead||o.type!=='cat')return;
    const ox=o.x-scrollX;
    if(ox<-100||ox>W+100)return;
    const img=IMG.cat;
    if(img){ctx.drawImage(img,ox,GROUND()-o.h,o.w,o.h);}
    else{ctx.fillStyle='#E76F51';ctx.fillRect(ox,GROUND()-o.h,o.w,o.h);}
  });
}

function drawObstacles(){
  drawRoadObstacles();
  drawCatObstacles();
}

function drawSnacks(){
  snacks.forEach(s=>{
    if(s.collected)return;
    const sx=s.x-scrollX;
    if(sx<-50||sx>W+50)return;
    const bob=Math.sin(frame*0.06+s.bob)*5;
    s.rot+=s.rotSpeed;
    ctx.save();ctx.translate(sx,s.y+bob);ctx.rotate(s.rot);
    ctx.shadowBlur=12;ctx.shadowColor='rgba(255,220,0,0.9)';
    const img=s.kind==='bone'?IMG.bone:IMG.cookie;
    if(img){ctx.drawImage(img,-22,-22,44,44);}
    else{ctx.font='26px Arial';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(s.kind==='bone'?'🦴':'🍪',0,0);}
    ctx.shadowBlur=0;ctx.restore();
  });
}

function drawPlayer(){
  if(player.invincible>0&&Math.floor(frame/4)%2===0)return;
  const bob=player.onGround?Math.sin(frame*0.15)*2:0;
  const py=player.y+bob;

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.12)';
  ctx.beginPath();ctx.ellipse(player.x+PLAYER_W/2,GROUND()+6,30,7,0,0,Math.PI*2);ctx.fill();

  // Luka (slightly behind)
  const lukaImg=getLukaImg()||IMG.luka_standing;
  if(lukaImg){
    ctx.drawImage(lukaImg,player.x+PLAYER_W-5,py+PLAYER_H-LUKA_H,LUKA_W,LUKA_H);
  }

  // Aviv
  const avivImg=getPlayerImg()||IMG.aviv_standing;
  if(avivImg){
    ctx.drawImage(avivImg,player.x,py,PLAYER_W,PLAYER_H);
  } else {
    ctx.fillStyle='#FF85A1';ctx.fillRect(player.x,py,PLAYER_W,PLAYER_H);
  }

  // Jump dust
  if(!player.onGround&&player.vy>0){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(player.x+15+i*20,py+PLAYER_H+8,3-i*0.5,0,Math.PI*2);ctx.fill();}
  }
}

// ── UPDATE ────────────────────────────────────────────────────
function update(){
  frame++;
  scrollX+=scrollSpeed;
  scrollSpeed=Math.min(3.5+frame*0.0008,7);

  // Physics
  player.vy+=GRAVITY;
  player.y+=player.vy;

  // Ground collision
  if(player.y+PLAYER_H>=GROUND()){
    player.y=GROUND()-PLAYER_H;
    player.vy=0;
    player.onGround=true;
  } else {
    player.onGround=false;
  }

  if(player.invincible>0)player.invincible--;

  // Obstacles
  obstacles.forEach(o=>{
    if(o.dead)return;
    const ox=o.x-scrollX;
    // Stomp from above (cat only)
    if(o.type==='cat'&&player.invincible<=0&&
      player.x+PLAYER_W-10>ox&&player.x+10<ox+o.w&&
      player.y+PLAYER_H>GROUND()-o.h&&player.y+PLAYER_H<GROUND()-o.h+20&&player.vy>0){
      o.dead=true;player.vy=JUMP_FORCE*0.5;score++;
      document.getElementById('sc').textContent=score;
      popup('😸 +1',player.x+PLAYER_W/2,player.y-20);
      return;
    }
    // Hit obstacle
    if(player.invincible<=0&&
      player.x+PLAYER_W-15>ox+15&&player.x+15<ox+o.w-5&&
      player.y+PLAYER_H-5>GROUND()-o.h&&player.y+10<GROUND()){
      loseLife();
    }
  });

  // Snacks
  snacks.forEach(s=>{
    if(s.collected)return;
    const sx=s.x-scrollX;
    if(Math.abs(sx-(player.x+PLAYER_W/2))<40&&Math.abs(s.y-player.y-PLAYER_H/2)<50){
      s.collected=true;score++;
      document.getElementById('sc').textContent=score;
      popup(s.kind==='bone'?'+1 🦴':'+1 🍪',sx,s.y-20);
    }
  });

  // Respawn obstacles/snacks when all passed
  const allPassed=obstacles.every(o=>o.x-scrollX<-200);
  if(allPassed){
    const base=scrollX+W+200;
    obstacles.forEach((o,i)=>{o.x=base+i*320+Math.random()*200;o.dead=false;});
    snacks.forEach((s,i)=>{s.x=base+i*180+Math.random()*80;s.collected=false;});
  }
}

function loseLife(){
  if(player.invincible>0)return;
  lives--;player.invincible=120;
  updateLives();
  if(lives<=0)setTimeout(endGame,600);
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawDecor();
  drawSnacks();
  drawGround();        // ground first
  drawRoadObstacles(); // road ON TOP of ground
  drawCatObstacles();  // cat ON TOP of ground
  drawPlayer();
}

// ── INPUT ─────────────────────────────────────────────────────
let touchStartY=null,touchStartX=null;
wrap.addEventListener('touchstart',e=>{
  if(state!=='playing')return;
  touchStartY=e.touches[0].clientY;
  touchStartX=e.touches[0].clientX;
},{passive:true});
wrap.addEventListener('touchend',e=>{
  if(state!=='playing'||touchStartY===null)return;
  const dy=touchStartY-e.changedTouches[0].clientY;
  const dx=Math.abs(e.changedTouches[0].clientX-touchStartX);
  if(dy>25&&dx<100&&player.onGround){player.vy=JUMP_FORCE;player.onGround=false;}
  touchStartY=null;
},{passive:true});
document.addEventListener('keydown',e=>{if((e.code==='Space'||e.code==='ArrowUp')&&player.onGround&&state==='playing'){player.vy=JUMP_FORCE;player.onGround=false;}});
wrap.addEventListener('click',()=>{if(state==='playing'&&player.onGround){player.vy=JUMP_FORCE;player.onGround=false;}});

// ── GAME FLOW ─────────────────────────────────────────────────
function loop(){update();render();raf=requestAnimationFrame(loop);}

function startGame(){
  score=0;lives=3;
  document.getElementById('sc').textContent='0';
  updateLives();initLevel();
  document.getElementById('splash-screen').style.display='none';
  document.getElementById('gameover-screen').style.display='none';
  document.getElementById('hud').style.display='flex';
  state='playing';if(raf)cancelAnimationFrame(raf);loop();
}

function endGame(){
  state='gameover';cancelAnimationFrame(raf);
  document.getElementById('hud').style.display='none';
  document.getElementById('fsn').textContent=score;
  document.getElementById('gameover-screen').style.display='flex';
}

function updateLives(){['h1','h2','h3'].forEach((id,i)=>document.getElementById(id).classList.toggle('lost',i>=lives));}

function popup(txt,x,y){
  const d=document.createElement('div');d.className='popup';
  d.style.left=x+'px';d.style.top=y+'px';d.textContent=txt;
  wrap.appendChild(d);setTimeout(()=>d.remove(),900);
}

document.getElementById('start-btn').addEventListener('click',startGame);
document.getElementById('restart-btn').addEventListener('click',startGame);

// ── INIT ──────────────────────────────────────────────────────
async function init(){
  await Promise.all([
    loadImg('aviv_standing','aviv_standing.png'),
    loadImg('aviv_walk_right','aviv_walk_right.png'),
    loadImg('aviv_walk_left','aviv_walk_left.png'),
    loadImg('luka_standing','luka_standing.png'),
    loadImg('luka_walk_right','luka_walk_right.png'),
    loadImg('luka_walk_left','luka_walk_left.png'),
    loadImg('bone','bone.png'),
    loadImg('cookie','cookie.png'),
    loadImg('road','road.png'),
    loadImg('cat','cat.png'),
    loadImg('tree','tree.png'),
    loadImg('tree2','tree2.png'),
    loadImg('bush','bush.png'),
    loadImg('bench','bench.png'),
    loadImg('swing','swing.png'),
    loadImg('swing2','swing2.png'),
    loadImg('slide','slide.png'),
    loadImg('cloud','cloud.png'),
    loadImg('logo','logo.png'),
    loadImg('splash_bg','splash_bg.png'),
  ]);
  document.getElementById('loading').style.display='none';
  document.getElementById('splash-screen').style.display='flex';
  drawSplash();
  state='splash';
}
init();
</script>
</body>
</html>
